<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabriel & Sammer Lea Wedding Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cormorant Garamond',serif;
    overflow:hidden;
    background:#f7f2ed;
}

/* ===========================
   ENVELOPE SCREEN
=========================== */

#envelopeScreen{
    position:fixed;
    inset:0;
    background:linear-gradient(
        to bottom,
        #f8f3ed,
        #efe3d5
    );
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.envelope{
    position:relative;
    width:380px;
    height:250px;
}

.envelope-body{
    position:absolute;
    width:100%;
    height:100%;
    background:#e6d5c3;
    border-radius:10px;
    overflow:hidden;
}

.envelope-body::before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:#d9bea3;
    clip-path:polygon(0 0,50% 55%,100% 0);
}

.flap{
    position:absolute;
    width:0;
    height:0;
    top:0;
    left:0;
    border-left:190px solid transparent;
    border-right:190px solid transparent;
    border-top:130px solid #cfb194;
    transform-origin:top;
    transition:1.5s;
    z-index:5;
}

.letter{
    position:absolute;
    width:90%;
    height:220px;
    left:5%;
    top:20px;
    background:white;
    border-radius:8px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    transition:1.5s;
    display:flex;
    justify-content:center;
    align-items:center;
}

.letter h2{
    font-family:'Great Vibes',cursive;
    font-size:3rem;
    color:#6b4f4a;
}

.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-170px);
}

#openBtn{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:50px;
    color:white;
    cursor:pointer;
    

}

/* ===========================
   INVITATION CARD
=========================== */

#cardContainer{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:#f7f2ed;
    perspective:1500px;
}

.card{
    width:420px;
    height:650px;
    position:relative;
    transform-style:preserve-3d;
    transition:1s;
    cursor:pointer;
}

.card.flip{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

/* FRONT */

.front{
    background:white;
}

.front img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BACK */
.back{
    background:white;
    transform:rotateY(180deg);
}

.back img{
    width:100%;
    height:100%;
    object-fit:cover;
}


</style>
</head>

<body>

<!-- ENVELOPE -->

<div id="envelopeScreen">

    <div class="envelope">

        <div class="flap"></div>

        <div class="envelope-body">
            
        </div>
    </div>

    <div id="openBtn" class="wax-seal">
    <img src="waxdried.png" alt="Wax Seal">
</div>

</div>

<!-- INVITATION -->

<div id="cardContainer">

    <div class="card" id="card">

        <img id="invitationCard"
         src="1.png"
         alt="Wedding Invitation">

    <p class="hint">
        Click the invitation to turn the page
    </p>

        <div class="back">
            <img src="2.png" alt="Invitation">
            <img src="3.png" alt="Invitation">
            <img src="5.png" alt="Invitation">
        </div>

    </div>
</div>

<script>

const openBtn = document.getElementById('openBtn');
const envelopeScreen = document.getElementById('envelopeScreen');
const cardContainer = document.getElementById('cardContainer');
const card = document.getElementById('card');

openBtn.addEventListener('click', () => {

    envelopeScreen.classList.add('open');

    setTimeout(() => {

        envelopeScreen.style.display = 'none';

        document.body.style.overflow='auto';

        cardContainer.style.display='flex';

    },1800);

});

const invitationCard =
document.getElementById('invitationCard');

const pages = [
    "1.png",
    "2.png",
    "3.png",
    "5.png"
];

let currentPage = 0;

invitationCard.addEventListener('click',()=>{

    currentPage++;

    if(currentPage >= pages.length){
        currentPage = 0;
    }

    invitationCard.style.opacity = 0;

    setTimeout(()=>{

        invitationCard.src = pages[currentPage];

        invitationCard.style.opacity = 1;

    },300);

});

</script>


</body>
</html>
